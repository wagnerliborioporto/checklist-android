<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#146c62">
  <title>Checklist</title>
  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      background: #f5f2ec;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    #appFrame {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
    }

    .preview-backdrop {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: rgba(20, 28, 35, .68);
      padding: 16px;
      overflow: auto;
    }

    .preview-shell {
      width: min(1100px, 100%);
      margin: 0 auto;
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 24px 70px rgba(0, 0, 0, .28);
      overflow: hidden;
    }

    .preview-toolbar {
      position: sticky;
      top: 0;
      z-index: 2;
      display: flex;
      gap: 10px;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      background: #146c62;
      color: #fff;
    }

    .preview-toolbar strong {
      font-size: 1rem;
    }

    .preview-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .preview-actions button {
      min-height: 42px;
      border: 0;
      border-radius: 8px;
      padding: 0 14px;
      font: inherit;
      font-weight: 800;
      cursor: pointer;
    }

    .preview-close {
      background: #fff;
      color: #146c62;
    }

    .preview-print {
      background: #e7f1ee;
      color: #0d5c53;
    }

    .preview-content {
      padding: 24px;
      color: #20252b;
    }

    .preview-content .print-report {
      display: block !important;
      position: static !important;
      width: auto !important;
      height: auto !important;
      overflow: visible !important;
      visibility: visible !important;
      opacity: 1 !important;
    }

    .preview-content .report-header {
      display: flex;
      justify-content: space-between;
      gap: 20px;
      align-items: flex-start;
      border-bottom: 2px solid #146c62;
      padding-bottom: 16px;
      margin-bottom: 18px;
    }

    .preview-content h1 {
      margin: 0;
      font-size: 1.8rem;
    }

    .preview-content p {
      color: #66717c;
    }

    .preview-content .report-summary {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin: 18px 0;
    }

    .preview-content .report-summary > div {
      border: 1px solid #d9d0c5;
      border-radius: 10px;
      padding: 12px;
    }

    .preview-content .report-summary span,
    .preview-content .report-summary strong {
      display: block;
    }

    .preview-content .report-summary strong {
      font-size: 1.35rem;
      margin-top: 4px;
    }

    .preview-content table {
      width: 100%;
      border-collapse: collapse;
      font-size: .9rem;
    }

    .preview-content th,
    .preview-content td {
      border: 1px solid #d9d0c5;
      padding: 9px;
      text-align: left;
      vertical-align: top;
    }

    .preview-content th {
      background: #e6efe9;
    }

    @media (max-width: 720px) {
      .preview-backdrop {
        padding: 0;
      }

      .preview-shell {
        border-radius: 0;
        min-height: 100%;
      }

      .preview-toolbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .preview-content {
        padding: 14px;
        overflow-x: auto;
      }

      .preview-content .report-summary {
        grid-template-columns: repeat(2, 1fr);
      }

      .preview-content .report-header {
        display: block;
      }

      .preview-content table {
        min-width: 760px;
      }
    }
  </style>
</head>
<body>
  <iframe id="appFrame" src="checklist-portatil.html" title="Checklist"></iframe>

  <script>
    const frame = document.getElementById("appFrame");

    frame.addEventListener("load", () => {
      try {
        const doc = frame.contentDocument;
        const win = frame.contentWindow;

        genericize(doc);

        const oldButton = doc.getElementById("printReportButton");
        if (!oldButton) return;

        const newButton = oldButton.cloneNode(true);
        newButton.lastChild.textContent = " Visualizar relatório";
        oldButton.replaceWith(newButton);

        newButton.addEventListener("click", () => {
          if (typeof win.renderPrintReport === "function") {
            win.renderPrintReport();
          }

          const report = doc.getElementById("printReport");
          if (!report) return;

          showPreview(report.cloneNode(true));
        });
      } catch (error) {
        console.error("Não foi possível preparar a visualização do relatório.", error);
      }
    });

    function genericize(doc) {
      doc.title = "Checklist";

      const replacements = [
        ["Checklist Wagner Porto", "Checklist"],
        ["Checklist Wagner", "Checklist"],
        ["Wagner Porto", ""],
        ["Wagner", ""]
      ];

      const walker = doc.createTreeWalker(doc.body, NodeFilter.SHOW_TEXT);
      const nodes = [];

      while (walker.nextNode()) nodes.push(walker.currentNode);

      nodes.forEach((node) => {
        let value = node.nodeValue;
        replacements.forEach(([from, to]) => {
          value = value.split(from).join(to);
        });
        node.nodeValue = value.replace(/\s{2,}/g, " ");
      });

      const description = doc.querySelector('meta[name="description"]');
      if (description) {
        description.content = "Checklist de tarefas com relatório e organização pessoal.";
      }
    }

    function showPreview(reportNode) {
      closePreview();

      const backdrop = document.createElement("div");
      backdrop.className = "preview-backdrop";
      backdrop.id = "reportPreview";

      const shell = document.createElement("section");
      shell.className = "preview-shell";

      const toolbar = document.createElement("header");
      toolbar.className = "preview-toolbar";

      const title = document.createElement("strong");
      title.textContent = "Visualização do relatório";

      const actions = document.createElement("div");
      actions.className = "preview-actions";

      const printButton = document.createElement("button");
      printButton.type = "button";
      printButton.className = "preview-print";
      printButton.textContent = "Imprimir / salvar PDF";
      printButton.addEventListener("click", () => printReport(reportNode));

      const closeButton = document.createElement("button");
      closeButton.type = "button";
      closeButton.className = "preview-close";
      closeButton.textContent = "Fechar";
      closeButton.addEventListener("click", closePreview);

      actions.append(printButton, closeButton);
      toolbar.append(title, actions);

      const content = document.createElement("div");
      content.className = "preview-content";
      reportNode.removeAttribute("aria-hidden");
      content.append(reportNode);

      shell.append(toolbar, content);
      backdrop.append(shell);
      document.body.append(backdrop);
      document.body.style.overflow = "hidden";
    }

    function closePreview() {
      const existing = document.getElementById("reportPreview");
      if (existing) existing.remove();
      document.body.style.overflow = "";
    }

    function printReport(reportNode) {
      const popup = window.open("", "_blank");
      if (!popup) {
        alert("Permita janelas pop-up para imprimir o relatório.");
        return;
      }

      popup.document.write(`
        <!doctype html>
        <html lang="pt-BR">
        <head>
          <meta charset="utf-8">
          <meta name="viewport" content="width=device-width, initial-scale=1">
          <title>Relatório do Checklist</title>
          <style>
            body { font-family: Arial, sans-serif; color: #20252b; margin: 28px; }
            .print-report { display: block !important; }
            .report-header { display:flex; justify-content:space-between; gap:20px; border-bottom:2px solid #146c62; padding-bottom:14px; }
            h1 { margin:0; }
            .report-summary { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin:18px 0; }
            .report-summary > div { border:1px solid #bbb; padding:10px; }
            .report-summary span, .report-summary strong { display:block; }
            table { width:100%; border-collapse:collapse; font-size:12px; }
            th, td { border:1px solid #bbb; padding:7px; text-align:left; }
            th { background:#e6efe9; }
            .report-footer { margin-top:18px; color:#66717c; }
            @media print { body { margin: 10mm; } }
          </style>
        </head>
        <body>${reportNode.outerHTML}</body>
        </html>
      `);

      popup.document.close();
      popup.focus();
      setTimeout(() => popup.print(), 350);
    }
  </script>
</body>
</html>
